<!doctype html>
<!-- Source for assets/beams-doorbell.jpg. Background art = Codex imagegen (assets/beams-doorbell-clean.jpg).
     Re-render:  google-chrome --headless=new --window-size=1536,1024 \
       --screenshot=/tmp/beams-doorbell.png "file://$PWD/assets/beams-doorbell.html"
     then:  convert /tmp/beams-doorbell.png -quality 90 assets/beams-doorbell.jpg -->
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1536px;height:1024px;overflow:hidden}
.stage{position:relative;width:1536px;height:1024px;
  background:#05060f url('beams-doorbell-clean.jpg') center/cover no-repeat;
  font-family:'Arial','Helvetica','DejaVu Sans',sans-serif}
.band{position:absolute;left:0;right:0;bottom:0;height:300px;
  background:linear-gradient(to top,
    rgba(2,3,10,0.95) 0%, rgba(2,3,10,0.90) 32%,
    rgba(2,3,10,0.58) 68%, rgba(2,3,10,0.0) 100%)}
.wrap{position:absolute;left:0;right:0;bottom:64px;text-align:center}
.title{font-size:88px;font-weight:800;letter-spacing:0.16em;line-height:1;padding-left:0.16em;
  background:linear-gradient(90deg,#4fd2ff 0%,#ffffff 50%,#bf95ff 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 15px rgba(90,200,255,0.55)) drop-shadow(0 0 42px rgba(160,120,255,0.40))}
.tag{margin-top:20px;font-size:31px;font-weight:600;letter-spacing:0.015em;color:#eaf4ff;
  text-shadow:0 2px 17px rgba(0,0,0,0.95), 0 0 3px rgba(0,0,0,0.95)}
</style></head><body>
<div class="stage"><div class="band"></div>
<div class="wrap">
  <div class="title">THE DOORBELL</div>
  <div class="tag">A new message rings the other window — it opens the door and answers</div>
</div></div></body></html>
