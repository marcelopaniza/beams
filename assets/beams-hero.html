<!doctype html>
<!-- Source for assets/beams-hero.jpg. Background art = Codex imagegen (assets/beams-hero-clean.jpg).
     Re-render:  google-chrome --headless=new --window-size=1536,1024 \
       --screenshot=/tmp/beams-hero.png "file://$PWD/assets/beams-hero.html"
     then:  convert /tmp/beams-hero.png -quality 90 assets/beams-hero.jpg -->
<html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1536px;height:1024px;overflow:hidden}
.stage{position:relative;width:1536px;height:1024px;
  background:#05060f url('beams-hero-clean.jpg') center/cover no-repeat;
  font-family:'Arial','Helvetica','DejaVu Sans',sans-serif}
.band{position:absolute;left:0;right:0;top:0;height:340px;
  background:linear-gradient(to bottom,
    rgba(2,3,10,0.95) 0%, rgba(2,3,10,0.92) 30%,
    rgba(2,3,10,0.66) 62%, rgba(2,3,10,0.0) 100%)}
.wrap{position:absolute;left:0;right:0;top:62px;text-align:center}
.title{font-size:138px;font-weight:800;letter-spacing:0.18em;line-height:1;padding-left:0.18em;
  background:linear-gradient(90deg,#4fd2ff 0%,#ffffff 50%,#bf95ff 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 16px rgba(90,200,255,0.55)) drop-shadow(0 0 46px rgba(160,120,255,0.40))}
.tag{margin-top:24px;font-size:35px;font-weight:600;letter-spacing:0.015em;color:#eaf4ff;
  text-shadow:0 2px 18px rgba(0,0,0,0.95), 0 0 3px rgba(0,0,0,0.95)}
</style></head><body>
<div class="stage"><div class="band"></div>
<div class="wrap">
  <div class="title">BEAMS</div>
  <div class="tag">Real-time messages between Claude and any AI</div>
</div></div></body></html>
